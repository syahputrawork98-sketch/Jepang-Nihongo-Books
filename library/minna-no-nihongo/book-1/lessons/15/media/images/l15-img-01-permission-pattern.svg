<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <style>
      .t{font:700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif;fill:#0f172a}
      .jp{font:700 32px 'Noto Sans JP','Poppins','Segoe UI',sans-serif;fill:#0f172a}
      .id{font:500 20px 'Noto Sans JP','Poppins','Segoe UI',sans-serif;fill:#334155}
      .h{font:700 23px 'Noto Sans JP','Poppins','Segoe UI',sans-serif;fill:#1e293b}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="640" y="88" text-anchor="middle" class="t">Pola Izin `Vて も いいです`</text>
  <rect x="96" y="160" width="1088" height="130" rx="16" fill="#dcfce7"/>
  <text x="640" y="234" text-anchor="middle" class="jp">ここ で しゃしん を とって も いいです。</text>
  <text x="640" y="272" text-anchor="middle" class="id">Di sini boleh mengambil foto.</text>
  <rect x="96" y="330" width="520" height="280" rx="16" fill="#dbeafe"/>
  <text x="356" y="392" text-anchor="middle" class="h">Struktur</text>
  <text x="356" y="444" text-anchor="middle" class="jp">Vて + も いいです</text>
  <text x="356" y="492" text-anchor="middle" class="id">boleh melakukan V</text>
  <rect x="664" y="330" width="520" height="280" rx="16" fill="#fef3c7"/>
  <text x="924" y="392" text-anchor="middle" class="h">Contoh</text>
  <text x="924" y="444" text-anchor="middle" class="jp">はいって も いいです</text>
  <text x="924" y="492" text-anchor="middle" class="id">boleh masuk</text>
</svg>
