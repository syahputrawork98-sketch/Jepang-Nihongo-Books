<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef8ff"/>
      <stop offset="100%" stop-color="#fff9f2"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .sub { font: 500 23px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 34px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 20px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .em { font: 600 20px 'Segoe UI Emoji','Apple Color Emoji',sans-serif; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="32" width="1200" height="656" rx="28" fill="#fff" stroke="#dbeafe" stroke-width="3"/>
  <text x="640" y="92" text-anchor="middle" class="title">ここ / そこ / あそこ</text>
  <text x="640" y="126" text-anchor="middle" class="sub">Kata tunjuk tempat: dekat saya, dekat kamu, dan jauh dari keduanya</text>

  <circle cx="210" cy="286" r="70" fill="#bfdbfe"/>
  <text x="210" y="292" text-anchor="middle" class="id">Saya <tspan class="em">🙂</tspan></text>
  <circle cx="1070" cy="286" r="70" fill="#fed7aa"/>
  <text x="1070" y="292" text-anchor="middle" class="id">Kamu <tspan class="em">👋</tspan></text>

  <rect x="306" y="232" width="110" height="110" rx="14" fill="#86efac"/>
  <text x="361" y="392" text-anchor="middle" class="jp">ここ</text>
  <text x="361" y="424" text-anchor="middle" class="id">koko - di sini</text>
  <line x1="245" y1="286" x2="306" y2="286" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="865" y="232" width="110" height="110" rx="14" fill="#fdba74"/>
  <text x="920" y="392" text-anchor="middle" class="jp">そこ</text>
  <text x="920" y="424" text-anchor="middle" class="id">soko - di situ</text>
  <line x1="1034" y1="286" x2="975" y2="286" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="585" y="486" width="110" height="110" rx="14" fill="#c4b5fd"/>
  <text x="640" y="646" text-anchor="middle" class="jp">あそこ</text>
  <text x="640" y="676" text-anchor="middle" class="id">asoko - di sana</text>
  <line x1="250" y1="336" x2="585" y2="540" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1030" y1="336" x2="695" y2="540" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
