<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <style>
      .title { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .sub { font: 500 23px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 34px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 21px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .em { font: 600 20px 'Segoe UI Emoji','Apple Color Emoji',sans-serif; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="32" width="1200" height="656" rx="28" fill="#fff" stroke="#e2e8f0" stroke-width="3"/>
  <text x="640" y="92" text-anchor="middle" class="title">こちら / そちら / あちら</text>
  <text x="640" y="126" text-anchor="middle" class="sub">Bentuk sopan untuk lokasi (lebih formal dari ここ/そこ/あそこ)</text>

  <rect x="120" y="186" width="320" height="420" rx="24" fill="#dbeafe"/>
  <text x="280" y="262" text-anchor="middle" class="jp">こちら <tspan class="em">🙂</tspan></text>
  <text x="280" y="296" text-anchor="middle" class="id">kochira - di sini (sopan)</text>
  <rect x="190" y="360" width="180" height="140" rx="18" fill="#60a5fa"/>

  <rect x="480" y="186" width="320" height="420" rx="24" fill="#ffedd5"/>
  <text x="640" y="262" text-anchor="middle" class="jp">そちら <tspan class="em">👈</tspan></text>
  <text x="640" y="296" text-anchor="middle" class="id">sochira - di situ (sopan)</text>
  <rect x="550" y="360" width="180" height="140" rx="18" fill="#fb923c"/>

  <rect x="840" y="186" width="320" height="420" rx="24" fill="#ede9fe"/>
  <text x="1000" y="262" text-anchor="middle" class="jp">あちら <tspan class="em">👉</tspan></text>
  <text x="1000" y="296" text-anchor="middle" class="id">achira - di sana (sopan)</text>
  <rect x="910" y="360" width="180" height="140" rx="18" fill="#a78bfa"/>
</svg>
