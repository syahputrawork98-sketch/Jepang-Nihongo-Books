<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 29px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="26" fill="#fff" stroke="#ddd6fe" stroke-width="3"/>
  <text x="640" y="86" text-anchor="middle" class="t">Pola Posisi Relatif</text>
  <text x="640" y="118" text-anchor="middle" class="s">`N1 は N2 の [posisi] です`</text>

  <rect x="92" y="162" width="1096" height="120" rx="16" fill="#dbeafe"/>
  <text x="120" y="214" class="h">Contoh 1</text>
  <text x="120" y="252" class="jp">トイレ は きょうしつ の となり です。</text>

  <rect x="92" y="312" width="1096" height="120" rx="16" fill="#ffedd5"/>
  <text x="120" y="364" class="h">Contoh 2</text>
  <text x="120" y="402" class="jp">えき は こうえん の まえ です。</text>

  <rect x="92" y="462" width="1096" height="170" rx="16" fill="#ede9fe"/>
  <text x="120" y="510" class="h">Contoh 3</text>
  <text x="120" y="548" class="jp">ぎんこう は びょういん の うしろ です。</text>
</svg>
