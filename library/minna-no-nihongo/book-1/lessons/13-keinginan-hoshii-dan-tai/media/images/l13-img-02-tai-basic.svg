<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <style>
      .t { font: 700 42px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 32px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 21px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="640" y="90" text-anchor="middle" class="t">Pola `Vます-stem + たいです`</text>
  <text x="640" y="124" text-anchor="middle" class="s">Dipakai untuk keinginan melakukan aktivitas</text>
  <rect x="96" y="170" width="1088" height="136" rx="16" fill="#e0f2fe"/>
  <text x="640" y="248" text-anchor="middle" class="jp">みず を のみたいです。</text>
  <text x="640" y="286" text-anchor="middle" class="id">Saya ingin minum air.</text>
  <rect x="120" y="340" width="1040" height="260" rx="16" fill="#f8fafc"/>
  <text x="190" y="412" class="jp">のみます</text>
  <text x="390" y="412" class="jp">→</text>
  <text x="470" y="412" class="jp">のみ</text>
  <text x="640" y="412" class="jp">+</text>
  <text x="760" y="412" class="jp">たいです</text>
  <text x="990" y="412" class="jp">→ のみたいです</text>
  <text x="640" y="500" text-anchor="middle" class="id">Contoh lain: いきます → いきたいです / みます → みたいです</text>
</svg>
