<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <style>
      .title { font: 700 40px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #0f172a; }
      .sub { font: 500 23px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #334155; }
      .jp { font: 700 28px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #0f172a; }
      .id { font: 500 20px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #334155; }
      .name { font: 700 22px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #1e293b; }
      .em { font: 600 20px 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="32" width="1200" height="656" rx="28" fill="#ffffff" stroke="#bae6fd" stroke-width="3"/>

  <text x="640" y="92" text-anchor="middle" class="title">Kaiwa Lesson 02 (Ringkas)</text>
  <text x="640" y="126" text-anchor="middle" class="sub">Alur: tanya benda → jawab benda → tanya pilihan (どれ/どの)</text>

  <circle cx="170" cy="470" r="64" fill="#bfdbfe"/>
  <text x="170" y="476" text-anchor="middle" class="name">A</text>
  <text x="170" y="522" text-anchor="middle" class="id">Penanya <tspan class="em">🙂</tspan></text>

  <circle cx="1110" cy="470" r="64" fill="#fed7aa"/>
  <text x="1110" y="476" text-anchor="middle" class="name">B</text>
  <text x="1110" y="522" text-anchor="middle" class="id">Penjawab <tspan class="em">👍</tspan></text>

  <rect x="300" y="168" width="430" height="108" rx="16" fill="#dbeafe"/>
  <text x="515" y="218" text-anchor="middle" class="jp">① これ は なん ですか。</text>
  <text x="515" y="248" text-anchor="middle" class="id">Kore wa nan desu ka.</text>

  <rect x="550" y="290" width="430" height="108" rx="16" fill="#ffedd5"/>
  <text x="765" y="340" text-anchor="middle" class="jp">② それ は じしょ です。</text>
  <text x="765" y="370" text-anchor="middle" class="id">Sore wa jisho desu.</text>

  <rect x="300" y="412" width="430" height="108" rx="16" fill="#ede9fe"/>
  <text x="515" y="462" text-anchor="middle" class="jp">③ どの かさ ですか。</text>
  <text x="515" y="492" text-anchor="middle" class="id">Dono kasa desu ka.</text>

  <rect x="760" y="430" width="260" height="150" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="890" y="470" text-anchor="middle" class="id">objek di meja</text>
  <rect x="796" y="492" width="60" height="42" rx="8" fill="#22c55e"/>
  <rect x="880" y="486" width="70" height="48" rx="8" fill="#60a5fa"/>
  <circle cx="983" cy="510" r="24" fill="#a78bfa"/>
</svg>
