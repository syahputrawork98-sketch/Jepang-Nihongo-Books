<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef8ff"/>
      <stop offset="100%" stop-color="#fffaf3"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .jp { font: 700 30px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .k { font: 600 17px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="26" fill="#fff" stroke="#dbeafe" stroke-width="3"/>

  <text x="640" y="86" text-anchor="middle" class="t">Pola Inti: `N を Vます`</text>
  <text x="640" y="118" text-anchor="middle" class="s">Baca urutan kiri -> kanan: objek -> partikel -> kata kerja</text>

  <rect x="80" y="152" width="1120" height="90" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="640" y="208" text-anchor="middle" class="jp">わたし は ほん を よみます。</text>

  <rect x="92" y="274" width="340" height="300" rx="16" fill="#dcfce7"/>
  <text x="262" y="320" text-anchor="middle" class="h">1) Objek (N)</text>
  <text x="262" y="368" text-anchor="middle" class="jp">ほん</text>
  <text x="262" y="404" text-anchor="middle" class="id">apa yang dikenai aksi</text>
  <text x="262" y="468" text-anchor="middle" class="k">contoh lain: コーヒー / えいが / しんぶん</text>

  <rect x="470" y="274" width="340" height="300" rx="16" fill="#ffedd5"/>
  <text x="640" y="320" text-anchor="middle" class="h">2) Partikel</text>
  <text x="640" y="368" text-anchor="middle" class="jp">を</text>
  <text x="640" y="404" text-anchor="middle" class="id">penanda objek langsung</text>
  <text x="640" y="468" text-anchor="middle" class="k">dibaca: "o"</text>

  <rect x="848" y="274" width="340" height="300" rx="16" fill="#ede9fe"/>
  <text x="1018" y="320" text-anchor="middle" class="h">3) Kata Kerja</text>
  <text x="1018" y="368" text-anchor="middle" class="jp">よみます</text>
  <text x="1018" y="404" text-anchor="middle" class="id">aksi yang dilakukan</text>
  <text x="1018" y="468" text-anchor="middle" class="k">contoh lain: のみます / みます / ききます</text>

  <rect x="92" y="598" width="1096" height="68" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="640" y="640" text-anchor="middle" class="id">Template: [orang] は [objek] を [kata kerja]。</text>
</svg>
