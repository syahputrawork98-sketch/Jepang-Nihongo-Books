<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .jp { font: 700 30px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .mini { font: 600 17px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="26" fill="#fff" stroke="#ddd6fe" stroke-width="3"/>

  <text x="640" y="86" text-anchor="middle" class="t">Usul Bersama: `Vましょう`</text>
  <text x="640" y="118" text-anchor="middle" class="s">Dipakai saat pembicara mengusulkan aksi bersama</text>

  <rect x="84" y="154" width="1112" height="82" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="640" y="205" text-anchor="middle" class="mini">Template: [aktivitas] を [kata kerja] ましょう。</text>

  <rect x="84" y="260" width="1112" height="392" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>

  <text x="120" y="312" class="h">Contoh 1</text>
  <text x="120" y="350" class="jp">ひるごはん を たべましょう。</text>
  <text x="120" y="380" class="id">Mari makan siang.</text>

  <text x="120" y="440" class="h">Contoh 2</text>
  <text x="120" y="478" class="jp">おんがく を ききましょう。</text>
  <text x="120" y="508" class="id">Mari mendengarkan musik.</text>

  <text x="120" y="568" class="h">Contoh 3 (rencana lanjut)</text>
  <text x="120" y="606" class="jp">では、さんじ に あいましょう。</text>
  <text x="120" y="636" class="id">Kalau begitu, mari bertemu jam 3.</text>
</svg>
