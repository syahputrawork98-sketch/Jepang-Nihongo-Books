<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
    <style>
      .title { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .sub { font: 500 23px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 34px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 21px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="32" width="1200" height="656" rx="28" fill="#fff" stroke="#ddd6fe" stroke-width="3"/>
  <text x="640" y="92" text-anchor="middle" class="title">～じ から ～じ まで</text>
  <text x="640" y="126" text-anchor="middle" class="sub">Rentang waktu: dari jam berapa sampai jam berapa</text>

  <line x1="220" y1="390" x2="1060" y2="390" stroke="#334155" stroke-width="8"/>
  <circle cx="380" cy="390" r="22" fill="#3b82f6"/>
  <circle cx="900" cy="390" r="22" fill="#f97316"/>

  <text x="380" y="330" text-anchor="middle" class="jp">9じ</text>
  <text x="900" y="330" text-anchor="middle" class="jp">5じ</text>

  <rect x="240" y="470" width="800" height="118" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="640" y="535" text-anchor="middle" class="jp">くじ から ごじ まで はたらきます。</text>
  <text x="640" y="568" text-anchor="middle" class="id">Bekerja dari jam 9 sampai jam 5.</text>
</svg>
