<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <style>
      .t { font: 700 42px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 34px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="640" y="90" text-anchor="middle" class="t">Pola `N が ほしいです`</text>
  <text x="640" y="124" text-anchor="middle" class="s">Dipakai untuk keinginan benda</text>
  <rect x="96" y="170" width="1088" height="136" rx="16" fill="#eff6ff"/>
  <text x="640" y="248" text-anchor="middle" class="jp">カメラ が ほしいです。</text>
  <text x="640" y="286" text-anchor="middle" class="id">Saya ingin kamera.</text>
  <rect x="160" y="350" width="300" height="230" rx="16" fill="#fde68a"/>
  <text x="310" y="420" text-anchor="middle" class="jp">カメラ 📷</text>
  <text x="310" y="468" text-anchor="middle" class="id">benda</text>
  <rect x="490" y="350" width="300" height="230" rx="16" fill="#bbf7d0"/>
  <text x="640" y="420" text-anchor="middle" class="jp">じてんしゃ 🚲</text>
  <text x="640" y="468" text-anchor="middle" class="id">benda</text>
  <rect x="820" y="350" width="300" height="230" rx="16" fill="#fecaca"/>
  <text x="970" y="420" text-anchor="middle" class="jp">くるま 🚗</text>
  <text x="970" y="468" text-anchor="middle" class="id">benda</text>
