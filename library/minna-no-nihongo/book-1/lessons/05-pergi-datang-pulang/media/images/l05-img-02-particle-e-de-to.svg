<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .jp { font: 700 30px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="38" y="30" width="1204" height="660" rx="26" fill="#fff" stroke="#bae6fd" stroke-width="3"/>

  <text x="640" y="86" text-anchor="middle" class="t">Partikel `へ` / `で` / `と`</text>
  <text x="640" y="118" text-anchor="middle" class="s">Baca urutan: tujuan -> cara -> teman</text>

  <rect x="80" y="156" width="1120" height="96" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="640" y="214" text-anchor="middle" class="jp">わたし は だいがく へ でんしゃ で ともだち と いきます。</text>

  <rect x="90" y="286" width="350" height="350" rx="16" fill="#dbeafe"/>
  <text x="265" y="334" text-anchor="middle" class="h">1) `へ`</text>
  <text x="265" y="374" text-anchor="middle" class="id">menunjukkan tujuan</text>
  <text x="265" y="420" text-anchor="middle" class="jp">だいがく へ</text>
  <text x="265" y="454" text-anchor="middle" class="id">ke universitas</text>
  <text x="265" y="518" text-anchor="middle" class="jp">どこ へ いきますか。</text>
  <text x="265" y="548" text-anchor="middle" class="id">Pergi ke mana?</text>

  <rect x="465" y="286" width="350" height="350" rx="16" fill="#ffedd5"/>
  <text x="640" y="334" text-anchor="middle" class="h">2) `で`</text>
  <text x="640" y="374" text-anchor="middle" class="id">alat/cara transportasi</text>
  <text x="640" y="420" text-anchor="middle" class="jp">でんしゃ で</text>
  <text x="640" y="454" text-anchor="middle" class="id">naik kereta</text>
  <text x="640" y="518" text-anchor="middle" class="jp">なに で いきますか。</text>
  <text x="640" y="548" text-anchor="middle" class="id">Pergi naik apa?</text>

  <rect x="840" y="286" width="350" height="350" rx="16" fill="#ede9fe"/>
  <text x="1015" y="334" text-anchor="middle" class="h">3) `と`</text>
  <text x="1015" y="374" text-anchor="middle" class="id">bersama siapa</text>
  <text x="1015" y="420" text-anchor="middle" class="jp">ともだち と</text>
  <text x="1015" y="454" text-anchor="middle" class="id">dengan teman</text>
  <text x="1015" y="518" text-anchor="middle" class="jp">だれ と いきますか。</text>
  <text x="1015" y="548" text-anchor="middle" class="id">Pergi dengan siapa?</text>
</svg>
