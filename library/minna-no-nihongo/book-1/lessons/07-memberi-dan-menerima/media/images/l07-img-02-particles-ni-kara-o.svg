<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .jp { font: 700 30px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="26" fill="#fff" stroke="#bae6fd" stroke-width="3"/>
  <text x="640" y="86" text-anchor="middle" class="t">Peran Partikel</text>
  <text x="640" y="118" text-anchor="middle" class="s">`に/から/を` pada pola memberi-menerima</text>

  <rect x="84" y="160" width="1112" height="90" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="640" y="215" text-anchor="middle" class="jp">わたし は ともだち に ほん を あげます。</text>

  <rect x="84" y="280" width="360" height="340" rx="16" fill="#dbeafe"/>
  <text x="264" y="328" text-anchor="middle" class="h">`に`</text>
  <text x="264" y="366" text-anchor="middle" class="id">kepada siapa</text>
  <text x="264" y="420" text-anchor="middle" class="jp">ともだち に</text>

  <rect x="460" y="280" width="360" height="340" rx="16" fill="#ffedd5"/>
  <text x="640" y="328" text-anchor="middle" class="h">`から`</text>
  <text x="640" y="366" text-anchor="middle" class="id">dari siapa (asal)</text>
  <text x="640" y="420" text-anchor="middle" class="jp">せんせい から</text>

  <rect x="836" y="280" width="360" height="340" rx="16" fill="#ede9fe"/>
  <text x="1016" y="328" text-anchor="middle" class="h">`を`</text>
  <text x="1016" y="366" text-anchor="middle" class="id">benda yang diberi/diterima</text>
  <text x="1016" y="420" text-anchor="middle" class="jp">ほん を</text>
</svg>
