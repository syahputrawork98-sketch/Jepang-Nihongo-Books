<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 29px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="26" fill="#fff" stroke="#bae6fd" stroke-width="3"/>
  <text x="640" y="86" text-anchor="middle" class="t">Kata Posisi Dasar</text>
  <text x="640" y="118" text-anchor="middle" class="s">うえ / した / なか / となり</text>

  <rect x="92" y="160" width="540" height="220" rx="16" fill="#dbeafe"/>
  <text x="124" y="208" class="h">Atas & Bawah</text>
  <text x="124" y="246" class="jp">つくえ の うえ</text>
  <text x="124" y="278" class="jp">つくえ の した</text>

  <rect x="648" y="160" width="540" height="220" rx="16" fill="#ffedd5"/>
  <text x="680" y="208" class="h">Dalam & Sebelah</text>
  <text x="680" y="246" class="jp">かばん の なか</text>
  <text x="680" y="278" class="jp">きょうしつ の となり</text>

  <rect x="92" y="412" width="1096" height="220" rx="16" fill="#ede9fe"/>
  <text x="124" y="460" class="h">Contoh Kalimat</text>
  <text x="124" y="500" class="jp">ほん は かばん の なか に あります。</text>
  <text x="124" y="532" class="jp">ねこ は いす の した に います。</text>
</svg>
