<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <style>
      .title { font: 700 40px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #0f172a; }
      .sub { font: 500 23px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #334155; }
      .jp { font: 700 38px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #1e293b; }
      .id { font: 500 21px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #334155; }
      .n { font: 700 30px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #0f172a; }
      .em { font: 600 22px 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="32" width="1200" height="656" rx="28" fill="#ffffff" stroke="#ddd6fe" stroke-width="3"/>

  <text x="640" y="92" text-anchor="middle" class="title">どの + N</text>
  <text x="640" y="126" text-anchor="middle" class="sub">`どの` WAJIB diikuti kata benda. Di sini N = ほん</text>

  <rect x="156" y="164" width="968" height="104" rx="18" fill="#ede9fe"/>
  <text x="640" y="227" text-anchor="middle" class="jp">どの ほん ですか。</text>

  <rect x="120" y="304" width="1040" height="54" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="640" y="338" text-anchor="middle" class="id">Tanya kategori dulu: "buku yang mana?" lalu pilih salah satu buku di bawah</text>

  <rect x="170" y="384" width="300" height="238" rx="18" fill="#dbeafe"/>
  <text x="320" y="430" text-anchor="middle" class="n">ほん A <tspan class="em">📘</tspan></text>
  <rect x="250" y="456" width="140" height="132" rx="10" fill="#60a5fa"/>

  <rect x="490" y="384" width="300" height="238" rx="18" fill="#dcfce7"/>
  <text x="640" y="430" text-anchor="middle" class="n">ほん B <tspan class="em">📗</tspan></text>
  <rect x="570" y="456" width="140" height="132" rx="10" fill="#22c55e"/>

  <rect x="810" y="384" width="300" height="238" rx="18" fill="#fee2e2"/>
  <text x="960" y="430" text-anchor="middle" class="n">ほん C <tspan class="em">📕</tspan></text>
  <rect x="890" y="456" width="140" height="132" rx="10" fill="#f87171"/>

  <text x="640" y="662" text-anchor="middle" class="id">Bandingkan: どれ ですか (tanpa N) vs どの N ですか (dengan N)</text>
</svg>
