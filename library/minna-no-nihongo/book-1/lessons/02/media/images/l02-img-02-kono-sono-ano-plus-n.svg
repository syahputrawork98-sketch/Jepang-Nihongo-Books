<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <style>
      .title { font: 700 40px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #0f172a; }
      .sub { font: 500 23px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #334155; }
      .jp { font: 700 34px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #0f172a; }
      .id { font: 500 21px 'Noto Sans JP', 'Poppins', 'Segoe UI', sans-serif; fill: #334155; }
      .em { font: 600 22px 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="32" width="1200" height="656" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/>

  <text x="640" y="92" text-anchor="middle" class="title">この / その / あの + N</text>
  <text x="640" y="126" text-anchor="middle" class="sub">`この/その/あの` harus diikuti kata benda (N)</text>

  <rect x="120" y="178" width="320" height="440" rx="24" fill="#dbeafe"/>
  <text x="280" y="256" text-anchor="middle" class="jp">この かばん <tspan class="em">🎒</tspan></text>
  <text x="280" y="288" text-anchor="middle" class="id">kono kaban - tas ini</text>
  <rect x="190" y="360" width="180" height="140" rx="18" fill="#60a5fa"/>
  <rect x="236" y="336" width="88" height="28" rx="10" fill="#93c5fd"/>

  <rect x="480" y="178" width="320" height="440" rx="24" fill="#ffedd5"/>
  <text x="640" y="256" text-anchor="middle" class="jp">その ほん <tspan class="em">📘</tspan></text>
  <text x="640" y="288" text-anchor="middle" class="id">sono hon - buku itu</text>
  <rect x="560" y="350" width="160" height="180" rx="10" fill="#fb923c"/>
  <line x1="580" y1="390" x2="700" y2="390" stroke="#fed7aa" stroke-width="6"/>

  <rect x="840" y="178" width="320" height="440" rx="24" fill="#ede9fe"/>
  <text x="1000" y="256" text-anchor="middle" class="jp">あの とけい <tspan class="em">⌚</tspan></text>
  <text x="1000" y="288" text-anchor="middle" class="id">ano tokei - jam itu</text>
  <circle cx="1000" cy="430" r="88" fill="#a78bfa"/>
  <circle cx="1000" cy="430" r="64" fill="#ddd6fe"/>
  <line x1="1000" y1="430" x2="1000" y2="390" stroke="#7c3aed" stroke-width="6"/>
  <line x1="1000" y1="430" x2="1034" y2="430" stroke="#7c3aed" stroke-width="6"/>

  <rect x="324" y="638" width="632" height="42" rx="10" fill="#f8fafc"/>
  <text x="640" y="666" text-anchor="middle" class="id">Contoh salah: `この です` (tidak boleh tanpa N)</text>
</svg>
