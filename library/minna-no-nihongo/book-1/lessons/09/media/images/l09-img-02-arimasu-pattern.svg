<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 29px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="26" fill="#fff" stroke="#bae6fd" stroke-width="3"/>
  <text x="640" y="86" text-anchor="middle" class="t">`N が あります`</text>
  <text x="640" y="118" text-anchor="middle" class="s">Menyatakan punya/ada benda</text>

  <rect x="84" y="162" width="1112" height="110" rx="16" fill="#dbeafe"/>
  <text x="640" y="228" text-anchor="middle" class="jp">わたし は くるま が あります。</text>

  <rect x="84" y="306" width="540" height="324" rx="16" fill="#dcfce7"/>
  <text x="116" y="354" class="h">Ada / Punya</text>
  <text x="116" y="398" class="jp">じかん が あります。</text>
  <text x="116" y="430" class="id">Ada waktu.</text>

  <rect x="656" y="306" width="540" height="324" rx="16" fill="#fee2e2"/>
  <text x="688" y="354" class="h">Tidak ada / Tidak punya</text>
  <text x="688" y="398" class="jp">おかね は あまり ありません。</text>
  <text x="688" y="430" class="id">Tidak terlalu punya uang.</text>
</svg>
