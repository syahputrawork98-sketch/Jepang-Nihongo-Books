<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 29px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="26" fill="#fff" stroke="#bae6fd" stroke-width="3"/>
  <text x="640" y="86" text-anchor="middle" class="t">Durasi: `どのくらい かかりますか`</text>
  <text x="640" y="118" text-anchor="middle" class="s">Menanyakan butuh waktu berapa lama</text>

  <rect x="84" y="162" width="1096" height="120" rx="16" fill="#dbeafe"/>
  <text x="120" y="214" class="h">Pertanyaan</text>
  <text x="120" y="252" class="jp">しゅくだい に どのくらい かかりますか。</text>

  <rect x="84" y="312" width="1096" height="320" rx="16" fill="#ffedd5"/>
  <text x="120" y="360" class="h">Jawaban</text>
  <text x="120" y="400" class="jp">いちじかん ぐらい かかります。</text>
  <text x="120" y="432" class="id">Butuh kira-kira satu jam.</text>
</svg>
