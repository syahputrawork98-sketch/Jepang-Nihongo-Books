<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <style>
      .title { font: 700 42px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .sub { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 34px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 21px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .opt { font: 700 28px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>

  <text x="640" y="88" text-anchor="middle" class="title">Pola Tanya `どちら` (2 Pilihan)</text>
  <text x="640" y="122" text-anchor="middle" class="sub">A と B と どちら が adj ですか</text>

  <rect x="96" y="164" width="1088" height="124" rx="16" fill="#e0f2fe"/>
  <text x="640" y="236" text-anchor="middle" class="jp">コーヒー と おちゃ と どちら が すき ですか。</text>
  <text x="640" y="272" text-anchor="middle" class="id">Kopi dan teh, yang mana lebih disukai?</text>

  <rect x="150" y="328" width="450" height="220" rx="16" fill="#dbeafe"/>
  <text x="375" y="392" text-anchor="middle" class="opt">A: コーヒー ☕</text>
  <text x="375" y="438" text-anchor="middle" class="id">opsi pertama</text>

  <rect x="680" y="328" width="450" height="220" rx="16" fill="#dcfce7"/>
  <text x="905" y="392" text-anchor="middle" class="opt">B: おちゃ 🍵</text>
  <text x="905" y="438" text-anchor="middle" class="id">opsi kedua</text>

  <text x="640" y="602" text-anchor="middle" class="sub">Tip: `どちら` untuk dua opsi. Jika lebih dari dua, pakai pola lain.</text>
</svg>
