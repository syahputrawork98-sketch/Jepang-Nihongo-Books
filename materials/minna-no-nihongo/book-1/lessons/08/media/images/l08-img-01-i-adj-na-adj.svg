<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef8ff"/>
      <stop offset="100%" stop-color="#fffaf3"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .jp { font: 700 29px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .k { font: 600 17px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="26" fill="#fff" stroke="#dbeafe" stroke-width="3"/>

  <text x="640" y="86" text-anchor="middle" class="t">`い`-adj vs `な`-adj (Pemula)</text>
  <text x="640" y="118" text-anchor="middle" class="s">Cara baca cepat: kenali jenis sifat, lalu pakai pola `N は ... です`</text>

  <rect x="84" y="152" width="1112" height="74" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="640" y="198" text-anchor="middle" class="k">Rule: `い-adj` langsung + `です`, `な-adj` pakai akar sifat + `です` (tanpa `な` di akhir kalimat nominal)</text>

  <rect x="92" y="246" width="540" height="386" rx="16" fill="#dbeafe"/>
  <text x="124" y="292" class="h">A. `い-adj`</text>
  <text x="124" y="336" class="jp">この ほん は あたらしい です。</text>
  <text x="124" y="368" class="id">Buku ini baru.</text>
  <text x="124" y="420" class="jp">その くるま は たかい です。</text>
  <text x="124" y="452" class="id">Mobil itu mahal.</text>
  <text x="124" y="514" class="k">contoh kata: おおきい / ちいさい / やすい</text>

  <rect x="648" y="246" width="540" height="386" rx="16" fill="#ffedd5"/>
  <text x="680" y="292" class="h">B. `な-adj`</text>
  <text x="680" y="336" class="jp">この まち は にぎやか です。</text>
  <text x="680" y="368" class="id">Kota ini ramai.</text>
  <text x="680" y="420" class="jp">あの こうえん は しずか です。</text>
  <text x="680" y="452" class="id">Taman itu tenang.</text>
  <text x="680" y="514" class="k">contoh kata: ゆうめい / べんり / きれい</text>
</svg>
