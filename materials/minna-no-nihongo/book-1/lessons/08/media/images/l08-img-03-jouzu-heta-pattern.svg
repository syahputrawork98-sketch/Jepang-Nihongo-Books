<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .jp { font: 700 29px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .k { font: 600 17px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="26" fill="#fff" stroke="#e2e8f0" stroke-width="3"/>

  <text x="640" y="86" text-anchor="middle" class="t">Kemampuan: `N が じょうず / へた`</text>
  <text x="640" y="118" text-anchor="middle" class="s">Kunci: menilai kemampuan terhadap bidang tertentu</text>

  <rect x="84" y="152" width="1112" height="74" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="640" y="198" text-anchor="middle" class="k">Template: [orang] は [bidang] が じょうず/へた です。</text>

  <rect x="92" y="246" width="540" height="386" rx="16" fill="#dcfce7"/>
  <text x="124" y="292" class="h">A. Mahir</text>
  <text x="124" y="336" class="jp">リナさん は ピアノ が じょうず です。</text>
  <text x="124" y="368" class="id">Rina mahir piano.</text>
  <text x="124" y="420" class="jp">サントスさん は にほんご が じょうず です。</text>
  <text x="124" y="452" class="id">Santos mahir bahasa Jepang.</text>

  <rect x="648" y="246" width="540" height="386" rx="16" fill="#fee2e2"/>
  <text x="680" y="292" class="h">B. Kurang mahir</text>
  <text x="680" y="336" class="jp">わたし は えいご が へた です。</text>
  <text x="680" y="368" class="id">Saya kurang mahir bahasa Inggris.</text>
  <text x="680" y="420" class="jp">わたし は りょうり が へた です。</text>
  <text x="680" y="452" class="id">Saya kurang mahir memasak.</text>
</svg>
