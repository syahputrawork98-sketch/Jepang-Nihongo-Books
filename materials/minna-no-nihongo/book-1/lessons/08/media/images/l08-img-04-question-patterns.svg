<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .jp { font: 700 29px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .k { font: 600 17px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="26" fill="#fff" stroke="#ddd6fe" stroke-width="3"/>

  <text x="640" y="86" text-anchor="middle" class="t">Pertanyaan Inti Lesson 08</text>
  <text x="640" y="118" text-anchor="middle" class="s">Gunakan 3 blok ini untuk percakapan deskripsi + preferensi + kemampuan</text>

  <rect x="84" y="152" width="1112" height="74" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="640" y="198" text-anchor="middle" class="k">Urutan praktis: (1) sifat benda/tempat -> (2) suka/tidak suka -> (3) kemampuan</text>

  <rect x="92" y="246" width="1096" height="120" rx="16" fill="#dbeafe"/>
  <text x="120" y="294" class="h">1) Deskripsi</text>
  <text x="120" y="334" class="jp">この まち は しずか ですか。</text>

  <rect x="92" y="396" width="1096" height="120" rx="16" fill="#ffedd5"/>
  <text x="120" y="444" class="h">2) Preferensi</text>
  <text x="120" y="484" class="jp">なに が すき ですか。</text>

  <rect x="92" y="546" width="1096" height="120" rx="16" fill="#ede9fe"/>
  <text x="120" y="594" class="h">3) Kemampuan</text>
  <text x="120" y="634" class="jp">にほんご が じょうず ですか。</text>
</svg>
