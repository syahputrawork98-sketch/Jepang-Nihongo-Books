<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ecfccb"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .jp { font: 700 30px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 20px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .n { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="640" y="84" text-anchor="middle" class="t">Konteks Kaiwa Lesson 13</text>
  <text x="640" y="116" text-anchor="middle" class="id">Rencana akhir pekan</text>

  <rect x="88" y="156" width="1104" height="238" rx="16" fill="#f8fafc"/>
  <text x="120" y="206" class="n">A:</text>
  <text x="170" y="206" class="jp">なに が ほしいですか。</text>
  <text x="170" y="248" class="id">Ingin apa?</text>
  <text x="120" y="306" class="n">B:</text>
  <text x="170" y="306" class="jp">あたらしい カメラ が ほしいです。</text>
  <text x="170" y="348" class="id">Ingin kamera baru.</text>

  <rect x="88" y="420" width="532" height="230" rx="16" fill="#dbeafe"/>
  <text x="354" y="496" text-anchor="middle" class="jp">うみ へ いきたいです。 🌊</text>
  <text x="354" y="542" text-anchor="middle" class="id">ingin pergi ke laut</text>

  <rect x="660" y="420" width="532" height="230" rx="16" fill="#dcfce7"/>
  <text x="926" y="496" text-anchor="middle" class="jp">しゃしん を とりたいです。 📸</text>
