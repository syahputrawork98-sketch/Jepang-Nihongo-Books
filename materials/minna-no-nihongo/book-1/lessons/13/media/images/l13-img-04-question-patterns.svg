<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
      .jp { font: 700 30px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 19px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="640" y="86" text-anchor="middle" class="t">Pola Tanya Lesson 13</text>

  <rect x="96" y="152" width="1088" height="160" rx="16" fill="#dbeafe"/>
  <text x="126" y="206" class="h">Tanya benda yang diinginkan</text>
  <text x="126" y="252" class="jp">なに が ほしいですか。</text>
  <text x="126" y="286" class="id">Ingin apa?</text>

  <rect x="96" y="342" width="1088" height="160" rx="16" fill="#dcfce7"/>
  <text x="126" y="396" class="h">Tanya tujuan/aktivitas yang diinginkan</text>
  <text x="126" y="442" class="jp">どこ へ いきたいですか。</text>
  <text x="126" y="476" class="id">Ingin pergi ke mana?</text>

  <rect x="96" y="532" width="1088" height="120" rx="16" fill="#fef3c7"/>
  <text x="126" y="582" class="id">Jawaban contoh: カメラ が ほしいです。 / きょうと へ いきたいです。</text>
</svg>
