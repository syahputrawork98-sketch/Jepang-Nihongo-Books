<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .jp { font: 700 29px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="26" fill="#fff" stroke="#bae6fd" stroke-width="3"/>

  <text x="640" y="86" text-anchor="middle" class="t">Aktivitas Harian (Contoh Siap Pakai)</text>
  <text x="640" y="118" text-anchor="middle" class="s">Setiap kotak = satu pola kalimat utuh</text>

  <rect x="84" y="160" width="540" height="230" rx="16" fill="#dbeafe"/>
  <text x="114" y="206" class="h">A. Makan & Minum</text>
  <text x="114" y="250" class="jp">あさごはん を たべます。</text>
  <text x="114" y="282" class="id">Sarapan.</text>
  <text x="114" y="328" class="jp">コーヒー を のみます。</text>
  <text x="114" y="360" class="id">Minum kopi.</text>

  <rect x="656" y="160" width="540" height="230" rx="16" fill="#ffedd5"/>
  <text x="686" y="206" class="h">B. Baca & Tonton</text>
  <text x="686" y="250" class="jp">しんぶん を よみます。</text>
  <text x="686" y="282" class="id">Membaca koran.</text>
  <text x="686" y="328" class="jp">えいが を みます。</text>
  <text x="686" y="360" class="id">Menonton film.</text>

  <rect x="84" y="422" width="1112" height="230" rx="16" fill="#ede9fe"/>
  <text x="114" y="468" class="h">C. Belajar</text>
  <text x="114" y="512" class="jp">べんきょう を します。</text>
  <text x="114" y="544" class="id">Belajar (melakukan kegiatan belajar).</text>
  <text x="114" y="590" class="jp">にほんご を べんきょうします。</text>
  <text x="114" y="622" class="id">Belajar bahasa Jepang.</text>
</svg>
