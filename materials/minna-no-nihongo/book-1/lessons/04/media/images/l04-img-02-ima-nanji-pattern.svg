<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <style>
      .title { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .sub { font: 500 23px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 36px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 21px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="32" width="1200" height="656" rx="28" fill="#fff" stroke="#bae6fd" stroke-width="3"/>
  <text x="640" y="92" text-anchor="middle" class="title">いま なんじ ですか</text>
  <text x="640" y="126" text-anchor="middle" class="sub">Pola menanyakan dan menjawab waktu</text>

  <rect x="250" y="190" width="780" height="100" rx="16" fill="#dbeafe"/>
  <text x="640" y="252" text-anchor="middle" class="jp">いま なんじ ですか。</text>

  <rect x="250" y="336" width="780" height="100" rx="16" fill="#dcfce7"/>
  <text x="640" y="398" text-anchor="middle" class="jp">いま しちじ はん です。</text>

  <rect x="340" y="502" width="600" height="110" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="640" y="548" text-anchor="middle" class="id">Variasi: いま くじ です。 / いま じゅうにじ ごふん です。</text>
</svg>
