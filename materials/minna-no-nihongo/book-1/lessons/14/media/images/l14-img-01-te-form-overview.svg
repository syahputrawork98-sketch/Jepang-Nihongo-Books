<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
      .jp { font: 700 30px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 20px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="640" y="86" text-anchor="middle" class="t">Ringkas Bentuk `て`</text>
  <rect x="96" y="150" width="1088" height="150" rx="16" fill="#eff6ff"/>
  <text x="126" y="208" class="h">Contoh perubahan</text>
  <text x="126" y="252" class="jp">かきます → かいて / よみます → よんで / まちます → まって</text>
  <rect x="96" y="330" width="528" height="292" rx="16" fill="#dcfce7"/>
  <text x="360" y="392" text-anchor="middle" class="h">Untuk instruksi</text>
  <text x="360" y="444" text-anchor="middle" class="jp">Vて ください</text>
  <text x="360" y="492" text-anchor="middle" class="id">Tolong lakukan V</text>
  <rect x="656" y="330" width="528" height="292" rx="16" fill="#ede9fe"/>
  <text x="920" y="392" text-anchor="middle" class="h">Untuk aksi berlangsung</text>
  <text x="920" y="444" text-anchor="middle" class="jp">Vて います</text>
  <text x="920" y="492" text-anchor="middle" class="id">Sedang melakukan V</text>
</svg>
