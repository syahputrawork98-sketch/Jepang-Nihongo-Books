<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .jp { font: 700 31px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 20px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="640" y="88" text-anchor="middle" class="t">Pola `Vて います`</text>
  <rect x="90" y="154" width="1100" height="130" rx="16" fill="#ede9fe"/>
  <text x="640" y="226" text-anchor="middle" class="jp">たなかさん は ほん を よんで います。</text>
  <text x="640" y="266" text-anchor="middle" class="id">Tanaka sedang membaca buku.</text>
  <rect x="90" y="318" width="350" height="300" rx="16" fill="#dbeafe"/>
  <text x="265" y="394" text-anchor="middle" class="jp">よみます</text>
  <text x="265" y="444" text-anchor="middle" class="id">bentuk dasar</text>
  <rect x="465" y="318" width="350" height="300" rx="16" fill="#dcfce7"/>
  <text x="640" y="394" text-anchor="middle" class="jp">よんで</text>
  <text x="640" y="444" text-anchor="middle" class="id">bentuk て</text>
  <rect x="840" y="318" width="350" height="300" rx="16" fill="#fef3c7"/>
  <text x="1015" y="394" text-anchor="middle" class="jp">よんで います</text>
  <text x="1015" y="444" text-anchor="middle" class="id">aksi sedang berlangsung</text>
