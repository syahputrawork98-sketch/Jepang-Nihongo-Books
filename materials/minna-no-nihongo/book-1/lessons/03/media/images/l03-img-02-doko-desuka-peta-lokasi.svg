<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <style>
      .title { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .sub { font: 500 23px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 36px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 21px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .tag { font: 700 20px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
      .em { font: 600 20px 'Segoe UI Emoji','Apple Color Emoji',sans-serif; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="32" width="1200" height="656" rx="28" fill="#fff" stroke="#bae6fd" stroke-width="3"/>
  <text x="640" y="92" text-anchor="middle" class="title">N は どこ ですか</text>
  <text x="640" y="126" text-anchor="middle" class="sub">Pola tanya lokasi untuk tempat/fasilitas</text>

  <rect x="260" y="166" width="760" height="94" rx="16" fill="#dbeafe"/>
  <text x="640" y="224" text-anchor="middle" class="jp">トイレ は どこ ですか。</text>

  <rect x="180" y="300" width="920" height="296" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="3"/>
  <rect x="230" y="360" width="210" height="90" rx="12" fill="#86efac"/><text x="335" y="414" text-anchor="middle" class="tag">うけつけ <tspan class="em">🧑‍💼</tspan></text>
  <rect x="500" y="360" width="210" height="90" rx="12" fill="#93c5fd"/><text x="605" y="414" text-anchor="middle" class="tag">ロビー <tspan class="em">🛋️</tspan></text>
  <rect x="770" y="360" width="210" height="90" rx="12" fill="#f9a8d4" stroke="#ec4899" stroke-width="4"/><text x="875" y="414" text-anchor="middle" class="tag">トイレ <tspan class="em">🚻</tspan></text>
  <text x="640" y="538" text-anchor="middle" class="id">Contoh jawaban: あそこ です / そこ です</text>
</svg>
