<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <style>
      .t { font: 700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .s { font: 500 22px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .jp { font: 700 29px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#0f172a; }
      .id { font: 500 18px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#334155; }
      .h { font: 700 24px 'Noto Sans JP','Poppins','Segoe UI',sans-serif; fill:#1e293b; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="26" fill="#fff" stroke="#e2e8f0" stroke-width="3"/>
  <text x="640" y="86" text-anchor="middle" class="t">Pola Tanya Lokasi</text>
  <text x="640" y="118" text-anchor="middle" class="s">`どこ に いますか` / `どこ に ありますか`</text>

  <rect x="92" y="162" width="1096" height="120" rx="16" fill="#dbeafe"/>
  <text x="120" y="214" class="h">Untuk orang/hewan</text>
  <text x="120" y="252" class="jp">ねこ は どこ に いますか。</text>

  <rect x="92" y="312" width="1096" height="120" rx="16" fill="#ffedd5"/>
  <text x="120" y="364" class="h">Untuk benda</text>
  <text x="120" y="402" class="jp">かばん は どこ に ありますか。</text>

  <rect x="92" y="462" width="1096" height="170" rx="16" fill="#ede9fe"/>
  <text x="120" y="510" class="h">Contoh Jawaban</text>
  <text x="120" y="548" class="jp">いす の した に います。 / つくえ の うえ に あります。</text>
</svg>
