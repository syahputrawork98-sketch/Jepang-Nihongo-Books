<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <style>
      .t{font:700 40px 'Noto Sans JP','Poppins','Segoe UI',sans-serif;fill:#0f172a}
      .jp{font:700 31px 'Noto Sans JP','Poppins','Segoe UI',sans-serif;fill:#0f172a}
      .id{font:500 20px 'Noto Sans JP','Poppins','Segoe UI',sans-serif;fill:#334155}
      .h{font:700 23px 'Noto Sans JP','Poppins','Segoe UI',sans-serif;fill:#1e293b}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="640" y="88" text-anchor="middle" class="t">Pola Bertanya Izin</text>
  <rect x="96" y="160" width="1088" height="130" rx="16" fill="#e0f2fe"/>
  <text x="640" y="234" text-anchor="middle" class="jp">しゃしん を とって も いいですか。</text>
  <text x="640" y="272" text-anchor="middle" class="id">Bolehkah mengambil foto?</text>
  <rect x="96" y="330" width="520" height="280" rx="16" fill="#dcfce7"/>
  <text x="356" y="394" text-anchor="middle" class="h">Jawaban Izin</text>
  <text x="356" y="444" text-anchor="middle" class="jp">はい、いいです。</text>
  <text x="356" y="494" text-anchor="middle" class="id">Boleh</text>
  <rect x="664" y="330" width="520" height="280" rx="16" fill="#fecaca"/>
  <text x="924" y="394" text-anchor="middle" class="h">Jawaban Larangan</text>
  <text x="924" y="444" text-anchor="middle" class="jp">いいえ、いけません。</text>
  <text x="924" y="494" text-anchor="middle" class="id">Tidak boleh</text>
</svg>
